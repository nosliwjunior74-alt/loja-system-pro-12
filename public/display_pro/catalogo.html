<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Catálogo</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"></head><body><div class="topo"><h1>Catálogo</h1><p>Produtos da loja ativa</p></div><div class="container"><div class="card"><div id="info" class="info"></div><button class="sec" onclick="ir('index.html')">Voltar</button></div><div id="grid" class="grid" style="margin-top:18px"></div></div><script src="app.js"></script><script>const store=DPS.activeStore();document.getElementById('info').textContent=store?'Loja ativa: '+store:'Nenhuma loja ativa.';const arr=store?DPS.products(store):[];const grid=document.getElementById('grid');if(!arr.length){grid.innerHTML='<div class="card">Nenhum produto cadastrado.</div>'}else{arr.forEach(p=>{const d=document.createElement('div');d.className='card';d.innerHTML=`<h3>${esc(p.nome)}</h3><p>Preço: ${esc(p.preco||'')}</p><p>Quantidade: ${esc(p.qtd)}</p>`;grid.appendChild(d)})}</script><script src="../shared/brand-sync.js"></script>
<script src="client-brand.js"></script>
</body></html>
