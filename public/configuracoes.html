<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Personalização da Loja</title><style>body{font-family:Arial;background:#fff7fb;margin:0;padding:30px;color:#4b1d36}h1{color:#b12d6e}label{display:block;margin:16px 0 6px;font-weight:bold}input{width:100%;max-width:520px;padding:12px;border-radius:12px;border:1px solid #e4b0ca}button{margin-top:18px;padding:12px 18px;border:none;border-radius:14px;background:#e33d8f;color:#fff;font-weight:bold;cursor:pointer}small{display:block;margin-top:6px;color:#7f5f70}.card{background:#fff;padding:24px;border-radius:20px;box-shadow:0 14px 28px rgba(227,61,143,.08);max-width:720px}.preview{margin-top:18px;display:flex;gap:16px;align-items:center;background:#fff7fb;padding:16px;border-radius:18px}.preview img{width:72px;height:72px;object-fit:contain;border-radius:18px;background:#fff;padding:8px;border:1px solid #f0ccde}</style></head><body><div class="card"><h1>Personalizar Loja Ativa</h1><label>Nome da loja</label><input id="storeName" placeholder="Ex.: Sua Loja"><label>Subtítulo</label><input id="storeSub" placeholder="Ex.: Dashboard Integrado"><label>Cor principal</label><input id="storeColor" type="color" value="#e33d8f"><label>Logo por URL</label><input id="storeLogo" placeholder="Ex.: https://.../logo.png"><label>Baixar logo do cliente do PC</label><input id="storeLogoFile" type="file" accept="image/*"><small>Agora salva no modo online e também no modo local.</small><div class="preview"><img id="logoPrev" src="assets/default-logo.svg" alt="Prévia"><div><strong id="namePrev">Sua Loja</strong><div id="subPrev">Dashboard Integrado Multi-Loja</div></div></div><button id="saveBtn">Salvar personalização</button><p id="status"></p></div><script src="js/local-store.js"></script><script>const defaults={name:'Sua Loja',sub:'Dashboard Integrado Multi-Loja',logo:'assets/default-logo.svg',color:'#e33d8f'};let activeStore=null;let uploadData='';let online=true;function refreshPreview(){namePrev.textContent=storeName.value.trim()||defaults.name;subPrev.textContent=storeSub.value.trim()||defaults.sub;if(storeLogo.value.trim())logoPrev.src=storeLogo.value.trim();}storeName.oninput=refreshPreview;storeSub.oninput=refreshPreview;storeLogo.oninput=refreshPreview;storeLogoFile.onchange=()=>{const file=storeLogoFile.files&&storeLogoFile.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{logoPrev.src=r.result;uploadData=r.result;};r.readAsDataURL(file);};async function loadActive(){ try{ const r=await fetch('/api/admin/session'); if(!r.ok) throw new Error('offline'); const data=await r.json(); activeStore=data.activeStore; online=true; } catch(e){ online=false; LocalStoreManager.ensureSeed(); activeStore=LocalStoreManager.getActive(); } const cfg=activeStore||defaults; storeName.value=cfg.name||''; storeSub.value=cfg.sub||''; storeLogo.value=(cfg.logo&&cfg.logo.startsWith('data:'))?'':(cfg.logo||''); storeColor.value=cfg.color||'#e33d8f'; logoPrev.src=cfg.logo||defaults.logo; namePrev.textContent=cfg.name||defaults.name; subPrev.textContent=cfg.sub||defaults.sub; document.documentElement.style.setProperty('--pink-4', cfg.color||'#e33d8f'); }document.getElementById('saveBtn').addEventListener('click',async()=>{if(!activeStore)return;const payload={name:storeName.value.trim()||defaults.name,sub:storeSub.value.trim()||defaults.sub,logo:(uploadData||storeLogo.value.trim()||defaults.logo),color:storeColor.value||defaults.color}; if(online){ const r=await fetch(`/api/admin/stores/${activeStore.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const data=await r.json().catch(()=>({})); if(!r.ok){status.textContent=data.error||'Não foi possível salvar.';return;} } else { LocalStoreManager.update(activeStore.id,payload); } status.textContent='Personalização salva com sucesso.'; parent.postMessage({type:'set-subtitle',subtitle:payload.sub},'*'); parent.postMessage({type:'branding-updated'},'*'); loadActive();});loadActive();</script></body></html>
