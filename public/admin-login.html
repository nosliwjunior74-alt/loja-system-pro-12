<!DOCTYPE html><html lang='pt-br'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Login do Produtor</title><style>body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#fff2f8,#ffe3f0);display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;color:#4b1d36}.card{width:min(92vw,420px);background:#fff;border-radius:24px;padding:28px;box-shadow:0 18px 40px rgba(227,61,143,.12)}h1{margin:0 0 8px;color:#b12d6e}.muted{color:#7f5f70;margin-bottom:16px}input,button{width:100%;box-sizing:border-box;padding:14px;border-radius:14px;border:1px solid #e4b0ca;margin-top:12px}button{border:none;background:#e33d8f;color:#fff;font-weight:700;cursor:pointer}#msg{margin-top:12px;color:#7f5f70}</style></head><body><div class='card'><h1>Login do Produtor</h1><div class='muted'>Banco conectado, licenças por loja e links públicos reais.</div><input id='username' placeholder='Usuário do produtor' value='produtor'><input id='password' type='password' placeholder='Senha do produtor'><button id='loginBtn'>Entrar</button><div id='msg'></div></div><script>async function check(){const r=await fetch('/api/admin/session');if(r.ok)location.href='/index.html';}check();document.getElementById('loginBtn').addEventListener('click',async()=>{const username=document.getElementById('username').value.trim();const password=document.getElementById('password').value.trim();const msg=document.getElementById('msg');msg.textContent='Entrando...';const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});const data=await r.json().catch(()=>({}));if(r.ok){location.href='/index.html';return;}msg.textContent=data.error||'Não foi possível entrar.';});</script></body></html>
