<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Biblioteca de Campanhas</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"></head><body>
<div class="topo"><h1>Biblioteca de Campanhas</h1><p>Crie campanhas com vídeo, capa, agenda, status e redes selecionadas</p></div>
<div class="container">
<div class="card"><div id="storeInfo" class="info"></div>
<input id="campanha" placeholder="Nome da campanha">
<input id="titulo" placeholder="Título da postagem">
<textarea id="legenda" placeholder="Legenda salva"></textarea>
<input id="link" placeholder="Link da campanha, produto ou WhatsApp da loja">
<label class="small">Data e hora do disparo</label><input id="agenda" type="datetime-local">
<label class="small">Status da campanha</label><select id="status"><option value="rascunho">Rascunho</option><option value="agendada">Agendada</option><option value="pronta">Pronta</option><option value="disparada">Disparada</option><option value="pausada">Pausada</option></select>
<label class="small">Redes para disparo</label>
<div class="barra"><label><input id="netWhats" type="checkbox" checked> WhatsApp</label><label><input id="netInsta" type="checkbox" checked> Instagram</label><label><input id="netFace" type="checkbox"> Facebook</label><label><input id="netTg" type="checkbox"> Telegram</label><label><input id="netTikTok" type="checkbox"> TikTok</label></div>
<label class="small">Upload do vídeo</label><input id="videoFile" type="file" accept="video/*">
<label class="small">Upload da capa</label><input id="coverFile" type="file" accept="image/*">
<div class="barra"><button onclick="saveCampaign()">Salvar campanha</button><button class="ok" onclick="manualTrigger()">Disparar agora</button><button class="blue" onclick="toggleScheduler()">Ativar agendador</button><button class="sec" onclick="ir('agenda.html')">Abrir calendário</button><button class="sec" onclick="ir('loja.html')">Voltar</button></div>
<div id="schedInfo" class="info"></div></div>
<div class="card" style="margin-top:18px"><h3>Campanhas salvas</h3><ul id="list" class="lista"></ul></div>
</div><script src="app.js"></script><script>
let editingId='';
function currentStore(){return DPS.activeStore()}
function setSchedulerInfo(){document.getElementById('schedInfo').textContent='Agendador automático: '+(DPS.schedulerEnabled()?'ATIVO':'DESLIGADO')+'. Deixe o app aberto perto do horário para o disparo assistido abrir as redes.'}
function render(){const store=currentStore();document.getElementById('storeInfo').textContent=store?'Loja ativa: '+store:'Nenhuma campanha encontrada para esta loja.';setSchedulerInfo();const list=document.getElementById('list');list.innerHTML='';if(!store){list.innerHTML='<li>Escolha uma loja para salvar campanhas.</li>';return;}const arr=DPS.campaigns(store);if(!arr.length){list.innerHTML='<li>Nenhuma campanha salva.</li>';return;}arr.forEach((c)=>{const li=document.createElement('li');li.innerHTML=`<b>${esc(c.name)}</b><span class="badge ${esc(c.status)}">${esc(c.status)}</span><div>${esc(c.title||'Sem título')}</div><div class="muted">Agendamento: ${esc(fmtDate(c.schedule))}</div><div class="muted">Redes: ${(c.networks?.whatsapp?'WhatsApp ':'')+(c.networks?.instagram?'Instagram ':'')+(c.networks?.facebook?'Facebook ':'')+(c.networks?.telegram?'Telegram ':'')+(c.networks?.tiktok?'TikTok ':'')}</div><div class="barra"><button data-edit="${c.id}">Editar</button><button class="ok" data-trigger="${c.id}">Disparar agora</button><button class="sec" data-select="${c.id}">Abrir no disparo</button><button class="dark" data-del="${c.id}">Excluir</button></div>`;list.appendChild(li)})}
async function saveCampaign(){const store=currentStore();if(!store)return alert('Selecione uma loja primeiro.');const name=document.getElementById('campanha').value.trim();if(!name)return alert('Digite o nome da campanha.');const videoFile=document.getElementById('videoFile').files[0];const coverFile=document.getElementById('coverFile').files[0];const arr=DPS.campaigns(store);const old=editingId?arr.find(c=>c.id===editingId):null;const payload={id:editingId||DPS.ensureId(),name,title:document.getElementById('titulo').value.trim(),caption:document.getElementById('legenda').value.trim(),link:document.getElementById('link').value.trim(),schedule:document.getElementById('agenda').value,status:document.getElementById('status').value,networks:{whatsapp:document.getElementById('netWhats').checked,instagram:document.getElementById('netInsta').checked,facebook:document.getElementById('netFace').checked,telegram:document.getElementById('netTg').checked,tiktok:document.getElementById('netTikTok').checked},videoDataUrl:old?.videoDataUrl||'',videoName:old?.videoName||'',coverDataUrl:old?.coverDataUrl||'',coverName:old?.coverName||'',updatedAt:new Date().toISOString()}; if(videoFile){payload.videoDataUrl=await fileToDataUrl(videoFile);payload.videoName=videoFile.name} if(coverFile){payload.coverDataUrl=await fileToDataUrl(coverFile);payload.coverName=coverFile.name} if(editingId){const idx=arr.findIndex(c=>c.id===editingId);arr[idx]=payload}else{arr.unshift(payload)} DPS.setCampaigns(store,arr);DPS.setSelectedCampaignId(payload.id);resetForm();render();alert('Campanha salva com sucesso.')}
function resetForm(){editingId='';['campanha','titulo','legenda','link','agenda'].forEach(id=>document.getElementById(id).value='');document.getElementById('status').value='rascunho';document.getElementById('videoFile').value='';document.getElementById('coverFile').value='';document.getElementById('netWhats').checked=true;document.getElementById('netInsta').checked=true;document.getElementById('netFace').checked=false;document.getElementById('netTg').checked=false;document.getElementById('netTikTok').checked=false}
function toggleScheduler(){DPS.setSchedulerEnabled(!DPS.schedulerEnabled());setSchedulerInfo();alert('Agendador agora está '+(DPS.schedulerEnabled()?'ATIVO':'DESLIGADO'))}
function manualTrigger(){const store=currentStore();const arr=DPS.campaigns(store);if(!arr.length)return alert('Salve uma campanha primeiro.');const c=editingId?arr.find(x=>x.id===editingId):arr[0]; if(!c)return alert('Nenhuma campanha encontrada.'); launchCampaign(c); c.status='disparada'; c.lastTriggeredAt=new Date().toISOString(); DPS.setCampaigns(store,arr); render();}
document.getElementById('list').addEventListener('click',(e)=>{const store=currentStore();let arr=DPS.campaigns(store); const id=e.target.dataset.edit||e.target.dataset.trigger||e.target.dataset.select||e.target.dataset.del; if(!id) return; const c=arr.find(x=>x.id===id); if(!c) return; if(e.target.dataset.edit){editingId=c.id;document.getElementById('campanha').value=c.name||'';document.getElementById('titulo').value=c.title||'';document.getElementById('legenda').value=c.caption||'';document.getElementById('link').value=c.link||'';document.getElementById('agenda').value=c.schedule||'';document.getElementById('status').value=c.status||'rascunho';document.getElementById('netWhats').checked=!!c.networks?.whatsapp;document.getElementById('netInsta').checked=!!c.networks?.instagram;document.getElementById('netFace').checked=!!c.networks?.facebook;document.getElementById('netTg').checked=!!c.networks?.telegram;document.getElementById('netTikTok').checked=!!c.networks?.tiktok;window.scrollTo({top:0,behavior:'smooth'})} if(e.target.dataset.trigger){launchCampaign(c); c.status='disparada'; c.lastTriggeredAt=new Date().toISOString(); DPS.setCampaigns(store,arr); render()} if(e.target.dataset.select){DPS.setSelectedCampaignId(c.id); ir('social.html')} if(e.target.dataset.del){if(!confirm('Excluir campanha?')) return; DPS.setCampaigns(store,arr.filter(x=>x.id!==id)); if(DPS.getSelectedCampaignId()===id) DPS.setSelectedCampaignId(''); render()}}); setSchedulerInfo(); render(); requestNotify();
</script><script src="../shared/brand-sync.js"></script>
<script src="client-brand.js"></script>
</body></html>
