  <script>
async function fazerBackup(){
  try {
    const r = await fetch('/api/admin/backup', { method: 'POST' });
    const j = await r.json();
    alert(j.ok ? '✅ Backup realizado com sucesso!' : '❌ Erro no backup');
  } catch(e){
    alert('Erro ao conectar com servidor');
  }
}
</script>
 <script>
window.listarBackups = async function(){
  alert('Botão Ver backups clicou');

  const r = await fetch('/api/admin/backups');
  const j = await r.json();

  const div = document.getElementById('listaBackups');
  div.innerHTML = '';

  if (!j.backups || j.backups.length === 0) {
    div.innerHTML = 'Nenhum backup encontrado';
    return;
  }

  j.backups.forEach(b => {
    const el = document.createElement('div');
    el.innerHTML = `${b} <button onclick="restaurar('${b}')">Restaurar</button>`;
    div.appendChild(el);
  });
}

window.restaurar = async function(arquivo){
  if (!confirm('Restaurar este backup?')) return;

  const r = await fetch('/api/admin/restore', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ arquivo })
  });

  const j = await r.json();
  alert(j.ok ? 'Restaurado com sucesso!' : 'Erro ao restaurar');
}
</script>
