<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Painel da Loja</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"></head><body><div class="topo"><h1>Painel da Loja</h1><p>Controle de produtos</p></div><div class="container"><div class="card"><div id="storeInfo" class="info"></div><input id="nome" placeholder="Nome do produto"><input id="preco" placeholder="Preço"><input id="qtd" type="number" placeholder="Quantidade"><div class="barra"><button onclick="addProduct()">Adicionar produto</button><button class="sec" onclick="ir('cliente.html')">Trocar loja</button><button class="sec" onclick="ir('index.html')">Voltar</button></div></div><div class="card" style="margin-top:18px"><h3>Produtos</h3><ul id="list" class="lista"></ul></div></div><script src="app.js"></script><script>
function render(){const store=DPS.activeStore();document.getElementById('storeInfo').textContent=store?'Loja ativa: '+store:'Nenhuma loja ativa.';const list=document.getElementById('list');list.innerHTML='';if(!store){list.innerHTML='<li>Escolha uma loja no Display da Loja.</li>';return;}const products=DPS.products(store);if(!products.length){list.innerHTML='<li>Nenhum produto cadastrado.</li>';return;}products.forEach((p,i)=>{const li=document.createElement('li');li.innerHTML=`<b>${esc(p.nome)}</b><div>Preço: ${esc(p.preco||'')}</div><div>Quantidade: ${esc(p.qtd)}</div><div class="barra"><button data-edit="${i}">Editar</button><button class="warn" data-out="${i}">Saída</button><button class="dark" data-del="${i}">Excluir</button></div>`;list.appendChild(li)})}
function addProduct(){const store=DPS.activeStore();if(!store)return alert('Selecione uma loja primeiro.');const nome=document.getElementById('nome').value.trim();if(!nome)return alert('Digite o nome do produto.');const arr=DPS.products(store);arr.push({nome,preco:document.getElementById('preco').value.trim(),qtd:parseInt(document.getElementById('qtd').value||'0',10)});DPS.setProducts(store,arr);document.getElementById('nome').value='';document.getElementById('preco').value='';document.getElementById('qtd').value='';render()}
document.getElementById('list').addEventListener('click',(e)=>{const store=DPS.activeStore();let arr=DPS.products(store);if(e.target.dataset.edit){const i=+e.target.dataset.edit;const p=arr[i];const nome=prompt('Nome:',p.nome);if(!nome)return;const preco=prompt('Preço:',p.preco);const qtd=prompt('Quantidade:',p.qtd);arr[i]={nome:nome.trim(),preco:(preco||'').trim(),qtd:parseInt(qtd||'0',10)};DPS.setProducts(store,arr);render()}if(e.target.dataset.out){const i=+e.target.dataset.out;arr[i].qtd=Math.max(0,(+arr[i].qtd||0)-1);DPS.setProducts(store,arr);render()}if(e.target.dataset.del){const i=+e.target.dataset.del;arr.splice(i,1);DPS.setProducts(store,arr);render()}});render();
</script><script src="../shared/brand-sync.js"></script>
<script src="client-brand.js"></script>
</body></html>
