<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login da Loja</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#120814,#8b1f55);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:380px;background:#17131c;padding:30px;border-radius:22px;box-shadow:0 20px 60px #0008}
h1{margin-top:0}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:0;font-size:15px}
button{background:#db3d95;color:white;font-weight:bold;cursor:pointer}
.alert{background:#ffecec;color:#9b1c1c;padding:12px;border-radius:10px;margin-bottom:15px}
.small{font-size:13px;color:#ddd}
</style>
</head>
<body>

<div class="card">
  <div id="alerta"></div>

  <h1>Login da Loja</h1>
  <p class="small">Acesse o painel da sua loja.</p>

  <label>Login</label>
  <input id="login" placeholder="Login da loja">

  <label>Senha</label>
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="entrar()">Entrar no painel da loja</button>

  <p id="msg" class="small"></p>
</div>

<script>
const params = new URLSearchParams(window.location.search);

let slug = params.get('loja');

// aceita também link /s/nome-da-loja
if (!slug && window.location.pathname.startsWith('/s/')) {
  slug = window.location.pathname.replace('/s/', '').split('/')[0];
}

if (slug) {
  slug = decodeURIComponent(slug).trim();
}

const alerta = document.getElementById('alerta');
const msg = document.getElementById('msg');

if (!slug) {
  alerta.innerHTML = '<div class="alert">Loja não informada.</div>';
}

async function carregarLoja() {
  if (!slug) return;

  try {
    const res = await fetch('/api/public/store/' + encodeURIComponent(slug));
    const data = await res.json();

    if (!res.ok || !data) {
      alerta.innerHTML = '<div class="alert">Loja não encontrada.</div>';
      return;
    }

    document.title = 'Login - ' + (data.name || data.nome || slug);
  } catch (e) {
    alerta.innerHTML = '<div class="alert">Erro ao carregar loja.</div>';
  }
}

async function entrar() {
  if (!slug) {
    msg.textContent = 'Loja não informada.';
    return;
  }

  const login = document.getElementById('login').value.trim();
  const password = document.getElementById('senha').value.trim();

  if (!login || !password) {
    msg.textContent = 'Digite login e senha.';
    return;
  }

  try {
    const res = await fetch('/api/public/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, login, password })
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      msg.textContent = data.error || data.erro || 'Login ou senha incorretos.';
      return;
    }

    localStorage.setItem('dashboardStoreSessionLocal', JSON.stringify({
      storeId: data.store?.id || data.loja?.id,
      slug,
      at: Date.now()
    }));

    window.location.href = '/dashboard-loja.html?loja=' + encodeURIComponent(slug);
  } catch (e) {
    msg.textContent = 'Erro ao entrar.';
  }
}

carregarLoja();
</script>

</body>
</html>
