<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provador IA</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
}

video, canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

#roupa{
  position:absolute;
  pointer-events:none;
  transform:translate(-50%, -50%);
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<img id="roupa" src="../imagens/look1.png">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const roupa = document.getElementById('roupa');

// câmera
navigator.mediaDevices.getUserMedia({ video:true }).then(stream=>{
  video.srcObject = stream;
});

// IA
const pose = new Pose({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
  }
});

pose.setOptions({
  modelComplexity:1,
  smoothLandmarks:true,
  minDetectionConfidence:0.5,
  minTrackingConfidence:0.5
});

pose.onResults(results=>{
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  if(results.poseLandmarks){

    const ombroE = results.poseLandmarks[11];
    const ombroD = results.poseLandmarks[12];

    const x = (ombroE.x + ombroD.x)/2 * canvas.width;
    const y = (ombroE.y + ombroD.y)/2 * canvas.height;

    const largura = Math.abs(ombroD.x - ombroE.x) * canvas.width;

    roupa.style.left = x + 'px';
    roupa.style.top = y + 'px';
    roupa.style.width = largura * 2 + 'px';
  }
});

// loop
const camera = new Camera(video,{
  onFrame: async ()=>{
    await pose.send({image:video});
  },
  width:640,
  height:480
});

camera.start();
</script>

</body>
</html>
