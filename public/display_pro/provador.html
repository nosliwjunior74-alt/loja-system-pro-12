<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Provador</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"></head><body><div class="topo"><h1>Provador Virtual</h1><p>Webcam da loja</p></div><div class="container center"><div class="card"><div class="barra" style="justify-content:center"><button onclick="ligar()">Ligar câmera</button><button class="sec" onclick="ir('index.html')">Voltar</button></div><div class="video-box"><video id="v" autoplay playsinline></video></div><p class="muted">Permita a câmera no navegador.</p></div></div><script src="app.js"></script><script>async function ligar(){try{const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});document.getElementById('v').srcObject=s}catch(e){alert('Não foi possível abrir a câmera.')}}</script><script src="../shared/brand-sync.js"></script>
<script src="client-brand.js"></script>
</body></html>
