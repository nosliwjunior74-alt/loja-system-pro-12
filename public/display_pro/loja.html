<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Display da Loja</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"><meta name="theme-color" content="#ff2f7d"></head><body>
<div class="topo"><h1 data-brand-name>Sua Loja</h1><p data-brand-sub>Display da loja</p></div>
<div class="container">
  <div class="card center">
    <div class="logo-box"><img id='displayBrandLogo' src='../assets/default-logo.svg' alt='Logo da loja' style='max-width:72px;max-height:72px;object-fit:contain'></div>
    <h2>Display da Loja</h2>
    <p>Área visual da loja para campanhas, biblioteca e disparo social.</p>
    <div class="barra" style="justify-content:center">
      <button class="sec" onclick="ir('videos.html')">Biblioteca de Campanhas</button>
      <button class="sec" onclick="ir('social.html')">Disparo Social</button>
      <button class="sec" onclick="ir('agenda.html')">Calendário</button>
      <button class="sec" onclick="ir('manual-loja.html')">Manual</button>
    </div>
    <div class="info">Esta tela é exclusiva da loja do cliente. O menu do produtor não aparece aqui.</div>
  </div>
</div>
<div class="rodape"><span data-brand-name>Sua Loja</span></div>
<script src="app.js"></script>
<script src="client-brand.js"></script>
<script src="../shared/brand-sync.js"></script>
</body></html>
