<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Disparo Social</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"></head><body>
<div class="topo"><h1>Disparo Social</h1><p>Carrega campanhas salvas automaticamente e prepara o disparo</p></div>
<div class="container"><div class="card"><div id="storeInfo" class="info"></div><label class="small">Escolha a campanha</label><select id="campaignSelect"></select><div class="barra"><button onclick="loadSelected()">Carregar campanha</button><button class="ok" onclick="dispararAgora()">Disparar agora</button><button class="sec" onclick="ir('videos.html')">Voltar para campanhas</button><button class="sec" onclick="ir('loja.html')">Voltar</button></div></div>
<div class="card" style="margin-top:18px"><input id="titulo" placeholder="Título"><textarea id="mensagem" placeholder="Legenda"></textarea><input id="link" placeholder="Link"><div class="info" id="scheduleInfo">Agendamento: -</div><div class="info" id="statusInfo">Status: -</div><div class="preview-grid"><div><h3>Vídeo</h3><div class="video-box"><video id="videoPreview" controls></video></div></div><div><h3>Capa</h3><div class="video-box"><img id="coverPreview"></div></div></div><div class="barra"><button onclick="copiarLegenda()">Copiar legenda</button><button onclick="abrirWhats()">WhatsApp</button><button onclick="abrirInstagram()">Instagram</button><button onclick="abrirFacebook()">Facebook</button><button onclick="abrirTelegram()">Telegram</button><button onclick="abrirTikTok()">TikTok</button></div><div class="info">TikTok já aparece no disparador. O envio direto real pode ser integrado pela Content Posting API oficial do TikTok quando o app tiver autorização.</div></div></div>
<script src="app.js"></script><script>
let selectedCampaign=null;
function campaigns(){const store=DPS.activeStore();return store?DPS.campaigns(store):[]}
function fillSelect(){const store=DPS.activeStore();document.getElementById('storeInfo').textContent=store?'Loja ativa: '+store:'Loja ativa não localizada.';const sel=document.getElementById('campaignSelect');sel.innerHTML='';const arr=campaigns();if(!arr.length){sel.innerHTML='<option value="">Nenhuma campanha encontrada</option>';clearPreview();return}arr.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=`${c.name} - ${c.status} - ${fmtDate(c.schedule)}`;sel.appendChild(o)});const remembered=DPS.getSelectedCampaignId();if(remembered && arr.some(c=>c.id===remembered)){sel.value=remembered}loadSelected()}
function clearPreview(){document.getElementById('titulo').value='';document.getElementById('mensagem').value='';document.getElementById('link').value='';document.getElementById('videoPreview').removeAttribute('src');document.getElementById('videoPreview').load();document.getElementById('coverPreview').removeAttribute('src');document.getElementById('scheduleInfo').textContent='Agendamento: -';document.getElementById('statusInfo').textContent='Status: -';selectedCampaign=null}
function loadSelected(){const id=document.getElementById('campaignSelect').value;const arr=campaigns();const c=arr.find(x=>x.id===id);if(!c){clearPreview();return}selectedCampaign=c;DPS.setSelectedCampaignId(c.id);document.getElementById('titulo').value=c.title||'';document.getElementById('mensagem').value=c.caption||'';document.getElementById('link').value=c.link||'';document.getElementById('scheduleInfo').textContent='Agendamento: '+fmtDate(c.schedule);document.getElementById('statusInfo').innerHTML='Status: <span class="badge '+esc(c.status)+'">'+esc(c.status)+'</span>';const v=document.getElementById('videoPreview');if(c.videoDataUrl){v.src=c.videoDataUrl}else{v.removeAttribute('src');v.load()}const img=document.getElementById('coverPreview');if(c.coverDataUrl){img.src=c.coverDataUrl}else{img.removeAttribute('src')}}
function textNow(){return [document.getElementById('titulo').value.trim(),document.getElementById('mensagem').value.trim(),document.getElementById('link').value.trim()].filter(Boolean).join('\n\n')}
function copiarLegenda(){navigator.clipboard.writeText(textNow());alert('Legenda copiada.')}
function abrirWhats(){window.open('https://wa.me/?text='+encodeURIComponent(textNow()),'_blank')}
function abrirInstagram(){copiarLegenda();window.open('https://www.instagram.com/','_blank')}
function abrirFacebook(){const link=document.getElementById('link').value.trim()||'https://example.com';window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(link),'_blank')}
function abrirTelegram(){const link=document.getElementById('link').value.trim()||'https://example.com';window.open('https://t.me/share/url?url='+encodeURIComponent(link)+'&text='+encodeURIComponent(textNow()),'_blank')}
function abrirTikTok(){navigator.clipboard.writeText(textNow());window.open('https://www.tiktok.com/upload?lang=pt-BR','_blank')}
function dispararAgora(){if(!selectedCampaign)return alert('Selecione uma campanha.');launchCampaign({...selectedCampaign,title:document.getElementById('titulo').value.trim(),caption:document.getElementById('mensagem').value.trim(),link:document.getElementById('link').value.trim()});const store=DPS.activeStore();let arr=DPS.campaigns(store);arr=arr.map(c=>c.id===selectedCampaign.id?{...c,status:'disparada',lastTriggeredAt:new Date().toISOString()}:c);DPS.setCampaigns(store,arr);fillSelect()}
document.getElementById('campaignSelect').addEventListener('change',loadSelected);fillSelect();requestNotify();
</script><script src="../shared/brand-sync.js"></script>
<script src="client-brand.js"></script>
</body></html>
