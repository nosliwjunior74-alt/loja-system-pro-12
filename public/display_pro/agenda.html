<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Calendário de Postagem</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"></head><body><div class="topo"><h1>Calendário de Postagem</h1><p>Agenda e status automático das campanhas</p></div><div class="container"><div class="card"><div id="storeInfo" class="info"></div><div class="barra"><button class="blue" onclick="toggleScheduler()">Ativar ou desligar agendador</button><button class="sec" onclick="ir('videos.html')">Abrir campanhas</button><button class="sec" onclick="ir('loja.html')">Voltar</button></div><div id="schedInfo" class="info"></div></div><div class="card calendar-box" style="margin-top:18px"><table class="table"><thead><tr><th>Campanha</th><th>Título</th><th>Agendamento</th><th>Status</th><th>Último disparo</th><th>Ação</th></tr></thead><tbody id="tbody"></tbody></table></div></div><script src="app.js"></script><script>
function setInfo(){document.getElementById('storeInfo').textContent=DPS.activeStore()?'Loja ativa: '+DPS.activeStore():'Loja ativa não localizada.';document.getElementById('schedInfo').textContent='Agendador automático: '+(DPS.schedulerEnabled()?'ATIVO':'DESLIGADO')}
function toggleScheduler(){DPS.setSchedulerEnabled(!DPS.schedulerEnabled());setInfo();render();alert('Agendador agora está '+(DPS.schedulerEnabled()?'ATIVO':'DESLIGADO'))}
function render(){setInfo();const tbody=document.getElementById('tbody');tbody.innerHTML='';const store=DPS.activeStore();if(!store){tbody.innerHTML='<tr><td colspan="6">Escolha uma loja primeiro.</td></tr>';return}const arr=DPS.campaigns(store);if(!arr.length){tbody.innerHTML='<tr><td colspan="6">Nenhuma campanha salva.</td></tr>';return}arr.forEach(c=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${esc(c.name)}</td><td>${esc(c.title||'')}</td><td>${esc(fmtDate(c.schedule))}</td><td><span class="badge ${esc(c.status)}">${esc(c.status)}</span></td><td>${esc(fmtDate(c.lastTriggeredAt))}</td><td><button data-open="${c.id}">Abrir</button></td>`;tbody.appendChild(tr)})}
document.getElementById('tbody').addEventListener('click',(e)=>{const id=e.target.dataset.open;if(!id)return;DPS.setSelectedCampaignId(id);ir('social.html')});render();setInterval(render,30000)
</script><script src="../shared/brand-sync.js"></script>
<script src="client-brand.js"></script>
</body></html>
