services:
  - type: web
    name: loja-system-pro-online
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: LICENSE_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: produtor
      - key: ADMIN_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false
      - key: DB_PATH
        value: /var/data/loja-system.sqlite
