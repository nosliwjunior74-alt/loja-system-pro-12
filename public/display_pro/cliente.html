<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Display da Loja</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.webmanifest"></head><body><div class="topo"><h1>Display da Loja</h1><p>Criar, entrar, editar e excluir lojas</p></div><div class="container"><div class="card"><div id="licInfo" class="info"></div><input id="name" placeholder="Nome da loja"><input id="color" placeholder="Cor principal da loja"><div class="barra"><button onclick="createStore()">Criar loja</button><button class="sec" onclick="ir('index.html')">Voltar</button></div></div><div class="card" style="margin-top:18px"><h3>Lojas cadastradas</h3><ul id="list" class="lista"></ul></div></div><script src="app.js"></script><script>
function render(){document.getElementById('licInfo').textContent=DPS.licenseActive()?'Licença ativa.':'Ative a licença antes de criar lojas.';const active=DPS.activeStore();const list=document.getElementById('list');list.innerHTML='';const stores=DPS.stores();if(!stores.length){list.innerHTML='<li>Nenhuma loja cadastrada.</li>';return}stores.forEach((s)=>{const li=document.createElement('li');li.innerHTML=`<b>${esc(s.name)}</b> ${active===s.name?'<span class="badge disparada">ativa</span>':''}<div class="muted">Cor: ${esc(s.color||'não definida')}</div><div class="barra"><button data-enter="${s.id}">Entrar</button><button class="sec" data-edit="${s.id}">Editar</button><button class="dark" data-delete="${s.id}">Excluir</button></div>`;list.appendChild(li)})}
function createStore(){if(!DPS.licenseActive()) return alert('Ative a licença primeiro.');const name=document.getElementById('name').value.trim();const color=document.getElementById('color').value.trim();if(!name) return alert('Digite o nome da loja.');if(DPS.storeExists(name)) return alert('Já existe uma loja com esse nome.');const stores=DPS.stores();stores.push({id:DPS.ensureId(),name,color});DPS.setStores(stores);DPS.setProducts(name,[]);DPS.setCampaigns(name,[]);document.getElementById('name').value='';document.getElementById('color').value='';render()}
document.getElementById('list').addEventListener('click',(e)=>{const enter=e.target.dataset.enter,edit=e.target.dataset.edit,del=e.target.dataset.delete;if(enter){const s=DPS.findStoreById(enter);if(!s)return;DPS.setActiveStore(s.name);alert('Loja ativa: '+s.name);render()}if(edit){const s=DPS.findStoreById(edit);if(!s)return;const newName=prompt('Novo nome da loja:',s.name);if(!newName)return;const trimmed=newName.trim();if(!trimmed)return alert('Nome inválido.');if(DPS.storeExists(trimmed,s.id)) return alert('Já existe outra loja com esse nome.');const newColor=prompt('Nova cor da loja:',s.color||'') ?? s.color ?? '';if(trimmed!==s.name) DPS.renameStoreData(s.name,trimmed);DPS.updateStore(s.id,{name:trimmed,color:newColor.trim()});render()}if(del){const s=DPS.findStoreById(del);if(!s)return;if(!confirm('Excluir loja '+s.name+'?'))return;DPS.deleteStore(del);render()}});render();
</script><script src="../shared/brand-sync.js"></script>
<script src="client-brand.js"></script>
</body></html>
