<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Segurança</title>
<style>
body{font-family:Arial;background:#ffe6f1;padding:40px}
.card{max-width:520px;margin:auto;background:white;padding:30px;border-radius:22px;box-shadow:0 10px 30px #0002}
h1{color:#b32575}
input,button{width:100%;padding:14px;margin:10px 0;border-radius:12px;border:1px solid #ddd}
button{background:#e33d8f;color:white;font-weight:bold;cursor:pointer}
#msg{margin-top:15px;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<h1>🔒 Segurança</h1>
<p>Troque a senha do produtor.</p>

<input id="atual" type="password" placeholder="Senha atual">
<input id="nova" type="password" placeholder="Nova senha forte">
<button onclick="trocarSenha()">Trocar senha</button>

<div id="msg"></div>
</div>

<script>
async function trocarSenha(){
  const currentPassword = document.getElementById('atual').value;
  const newPassword = document.getElementById('nova').value;
  const msg = document.getElementById('msg');

  const r = await fetch('/api/admin/change-password', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ currentPassword, newPassword })
  });

  const data = await r.json().catch(()=>({}));

  if(!r.ok){
    msg.style.color='red';
    msg.textContent = data.error || 'Erro ao trocar senha';
    return;
  }

  msg.style.color='green';
  msg.textContent = 'Senha alterada com sucesso!';
}
</script>
</body>
</html>
